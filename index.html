<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مين هيكسب؟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161311;
    --page-bg:#141210;
    --panel-bg:#1d1a16;
    --panel-border:#3a352c;
    --paper:#F7F3E9;
    --muted-onpage:#b8ae9c;
    --muted-oncard:#6b6459;
    --card:#FFFFFF;
    --card-tint:#F1ECDE;
    --red:#D6291B;
    --red-dark:#9E1B10;
    --red-bright:#FF5C46;
    --gold:#E8B84B;
    --gold-dark:#8a6a1c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Cairo',sans-serif;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 88% 82%, rgba(214,41,27,0.14), transparent 45%),
      var(--page-bg);
    color:var(--paper);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:3px 3px;
    pointer-events:none;
    z-index:0;
  }
  #app{ width:100%; max-width:760px; position:relative; z-index:1; }

  /* ---------- mute toggle ---------- */
  #muteBtn{
    position:fixed; top:16px; left:16px; z-index:50;
    width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,0.06); border:2px solid var(--panel-border);
    color:var(--paper); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  .eyebrow{
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:13px;
    letter-spacing:.5px;
    color:var(--gold);
    text-align:center;
    margin-bottom:6px;
  }
  .display-title{
    font-family:'Lalezar',sans-serif;
    font-size:44px;
    line-height:1.15;
    text-align:center;
    color:var(--paper);
    text-shadow:0 3px 0 rgba(0,0,0,0.5);
  }
  .display-title .accent{ color:var(--red-bright); }
  .subtitle{
    text-align:center;
    color:var(--muted-onpage);
    font-size:15px;
    font-weight:600;
    margin-top:8px;
    margin-bottom:26px;
  }

  @keyframes popIn {
    0%{ transform:scale(.94) translateY(8px); opacity:0; }
    100%{ transform:scale(1) translateY(0); opacity:1; }
  }

  /* ---------- dark panel (setup screen host) ---------- */
  .panel{
    background:var(--panel-bg);
    border:2px solid var(--panel-border);
    border-radius:22px;
    padding:26px 22px;
    animation:popIn .3s cubic-bezier(.2,.9,.3,1.15);
  }

  /* ---------- stamp card (in-game, white "physical card" look) ---------- */
  .stamp{
    background:var(--card);
    color:var(--ink);
    border:3px solid var(--ink);
    border-radius:22px;
    position:relative;
    overflow:hidden;
    padding:28px 22px;
    box-shadow:0 18px 0 -8px rgba(0,0,0,0.35), 0 26px 44px rgba(0,0,0,0.5);
    animation:popIn .28s cubic-bezier(.2,.9,.3,1.2);
  }
  .stamp::after{
    content:"";
    position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(22,19,17,0.05) 1px, transparent 1px);
    background-size:5px 5px;
  }
  .stamp .arc-deco{ position:absolute; inset:0; pointer-events:none; opacity:.5; }
  .stamp .corner-star{ position:absolute; width:22px; height:22px; opacity:.92; z-index:2; }
  .stamp .corner-star.tl{ top:14px; left:14px; }
  .stamp .corner-star.tr{ top:14px; right:14px; }
  .stamp .corner-star.bl{ bottom:14px; left:14px; }
  .stamp .corner-star.br{ bottom:14px; right:14px; }
  .stamp-inner{ position:relative; z-index:1; }

  .badge-label{
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:14px;
    text-align:center;
    color:var(--muted-oncard);
    letter-spacing:.5px;
    margin-bottom:4px;
  }
  .badge-label.red{ color:var(--red); }

  /* ---------- buttons ---------- */
  .btn{
    display:block;
    width:100%;
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:17px;
    padding:16px 18px;
    border-radius:14px;
    border:3px solid transparent;
    cursor:pointer;
    text-align:center;
    transition:transform .08s ease, filter .1s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn:hover{ filter:brightness(1.05); }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; }

  /* on the white stamp card */
  .btn.on-card-primary{ background:var(--red); color:#fff; border-color:var(--red-dark); }
  .btn.on-card-outline{ background:transparent; color:var(--ink); border-color:var(--ink); }
  .btn.on-card-muted{ background:transparent; color:var(--muted-oncard); border-color:#d8d2c3; font-size:14px; padding:11px 14px; }

  /* on the dark panel / page */
  .btn.on-dark-primary{ background:var(--red); color:#fff; border-color:var(--red-dark); }
  .btn.on-dark-outline{ background:rgba(255,255,255,0.03); color:var(--paper); border-color:var(--panel-border); }

  .btn-row{ display:flex; gap:10px; }
  .btn-row .btn{ flex:1; }

  /* ---------- setup screen (inside .panel, dark) ---------- */
  .mode-row{ display:flex; gap:10px; margin-bottom:18px; }
  .mode-btn{
    flex:1; padding:16px 10px; border-radius:14px; border:2px solid var(--panel-border);
    background:rgba(255,255,255,0.03); color:var(--paper); cursor:pointer;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:15px; text-align:center;
    transition:border-color .15s, background .15s;
  }
  .mode-btn.active{ border-color:var(--red); background:rgba(214,41,27,0.2); color:#fff; }

  .field-label{ font-weight:800; font-size:13px; color:var(--muted-onpage); margin:16px 0 8px; }
  .team-input{
    width:100%; padding:13px 14px; border-radius:12px; border:2px solid var(--panel-border);
    background:rgba(255,255,255,0.05); color:var(--paper); font-family:'Cairo',sans-serif;
    font-weight:700; font-size:15px; margin-bottom:10px;
  }
  .team-input::placeholder{ color:#736c5e; }
  .team-input:focus{ outline:none; border-color:var(--gold); }
  .team-count-row{ display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:16px; }
  .count-btn{
    width:42px; height:42px; border-radius:50%; border:2px solid var(--paper);
    background:rgba(255,255,255,0.04); color:var(--paper); font-size:20px; font-weight:800; cursor:pointer;
  }
  .count-val{ font-family:'Lalezar',sans-serif; font-size:32px; min-width:40px; text-align:center; color:var(--gold); }
  .rounds-row{ display:flex; gap:8px; justify-content:center; margin-bottom:6px; flex-wrap:wrap; }
  .round-chip{
    padding:10px 16px; border-radius:10px; border:2px solid var(--panel-border); background:transparent;
    color:var(--paper); font-weight:800; cursor:pointer; font-family:'Cairo',sans-serif;
  }
  .round-chip.active{ border-color:var(--gold); background:rgba(232,184,75,0.15); color:var(--gold); }

  /* ---------- play screen chrome (on dark page) ---------- */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:16px; font-weight:800; font-size:13px; color:var(--muted-onpage);
  }
  .scoreboard{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .score-pill{
    flex:1; min-width:90px; background:rgba(255,255,255,0.04); border:2px solid var(--panel-border);
    border-radius:12px; padding:9px 10px; text-align:center; transition:border-color .2s, background .2s;
  }
  .score-pill.turn{ border-color:var(--red); background:rgba(214,41,27,0.16); }
  .score-pill .nm{ font-size:12px; font-weight:700; color:var(--muted-onpage); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .score-pill.turn .nm{ color:#fff; }
  .score-pill .sc{ font-family:'Lalezar',sans-serif; font-size:24px; color:var(--gold); }

  .turn-line{ text-align:center; font-weight:700; color:var(--muted-onpage); margin-bottom:18px; font-size:14px; }
  .turn-line b{ color:#fff; }

  /* ---------- card content ---------- */
  .word-display{
    font-family:'Lalezar',sans-serif; font-size:44px; text-align:center; line-height:1.2;
    letter-spacing:1px; margin:14px 0 6px; color:var(--ink);
  }
  .word-display.reversed{ letter-spacing:6px; font-size:36px; direction:ltr; unicode-bidi:bidi-override; color:var(--red-dark); }
  .clue-box{
    background:var(--card-tint); border:2px dashed #c3b99f; border-radius:14px; padding:18px;
    font-size:19px; font-weight:700; text-align:center; margin:14px 0; min-height:64px;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
  }
  .points-badge{
    font-family:'Lalezar',sans-serif; background:var(--red); color:#fff; border-radius:50%;
    width:58px; height:58px; display:flex; align-items:center; justify-content:center;
    font-size:26px; margin:0 auto 12px; border:3px solid var(--red-dark);
  }
  .timer-wrap{ margin:10px 0 16px; }
  .timer-track{ background:#e9e3d4; border-radius:999px; height:14px; overflow:hidden; border:2px solid var(--ink); }
  .timer-fill{ height:100%; background:var(--red); transition:width 1s linear; }
  .timer-num{ text-align:center; font-family:'Lalezar',sans-serif; font-size:30px; margin-top:6px; color:var(--ink); }
  @keyframes pulseRed{ 0%,100%{ color:var(--ink); } 50%{ color:var(--red); } }
  .timer-num.urgent{ animation:pulseRed .5s infinite; }

  .hint-progress{ display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
  .hint-dot{ width:10px; height:10px; border-radius:50%; background:#d8d2c3; border:2px solid var(--ink); }
  .hint-dot.on{ background:var(--red); }

  .instr{ text-align:center; color:var(--muted-oncard); font-weight:700; font-size:14px; margin-bottom:6px; }
  .ready-mark{ text-align:center; font-family:'Lalezar',sans-serif; font-size:70px; margin:14px 0; color:var(--ink); animation:breathe 1.6s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }

  /* ---------- results overlay ---------- */
  .result-title{ font-family:'Lalezar',sans-serif; font-size:32px; text-align:center; margin-bottom:6px; color:var(--ink); }
  .result-sub{ text-align:center; font-weight:700; color:var(--muted-oncard); margin-bottom:18px; }
  .answer-reveal{ text-align:center; font-family:'Lalezar',sans-serif; font-size:30px; color:var(--red); margin-bottom:18px; }

  /* ---------- leaderboard ---------- */
  .lb-row{
    display:flex; align-items:center; justify-content:space-between; padding:14px 16px;
    border:2px solid var(--ink); border-radius:14px; margin-bottom:10px; background:#fff;
  }
  .lb-row.winner{ background:var(--gold); border-color:var(--gold-dark); }
  .lb-rank{ font-family:'Lalezar',sans-serif; font-size:22px; width:34px; color:var(--ink); }
  .lb-name{ flex:1; font-weight:800; font-size:16px; color:var(--ink); }
  .lb-score{ font-family:'Lalezar',sans-serif; font-size:24px; color:var(--red); }

  .footer-note{ text-align:center; color:#6f6a5e; font-size:12px; margin-top:20px; font-weight:600; }

  /* ---------- trivia options ---------- */
  .options-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .opt-btn{ font-size:14px; padding:14px 8px; }

  /* ---------- drawing canvas ---------- */
  #drawCanvas{
    display:block; width:100%; height:260px; background:#fff;
    border:2px solid var(--ink); border-radius:14px; touch-action:none; margin:6px 0 10px;
  }
  .clear-row{ text-align:center; margin-bottom:10px; }
  .clear-btn{
    display:inline-block; width:auto; padding:8px 18px; font-size:13px;
  }

  /* ---------- confetti ---------- */
  #confettiLayer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:40; }
  .confetti-piece{
    position:absolute; top:-20px; width:9px; height:14px; opacity:.9;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(540deg); opacity:0.9; }
  }

  @media (max-width:480px){
    .display-title{ font-size:32px; }
    .word-display{ font-size:32px; }
    .word-display.reversed{ font-size:26px; letter-spacing:4px; }
  }
</style>
</head>
<body>
<button id="muteBtn" onclick="toggleMute()">🔊</button>
<div id="confettiLayer"></div>
<div id="app"></div>

<script>
/* ======================= SOUND FX (Web Audio, no files needed) ======================= */
const SFX = (function(){
  let ctx=null, muted=false;
  function ensure(){
    if(!ctx){ ctx = new (window.AudioContext||window.webkitAudioContext)(); }
    if(ctx.state==='suspended'){ ctx.resume(); }
  }
  function tone(freq, start, dur, type, vol){
    if(muted) return;
    try{
      ensure();
      const t0 = ctx.currentTime+start;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type=type||'sine'; osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(vol||0.15, t0+0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0+dur+0.03);
    }catch(e){}
  }
  return {
    toggleMute(){ muted=!muted; return muted; },
    click(){ tone(500,0,0.06,'square',0.09); },
    next(){ tone(660,0,0.07,'triangle',0.12); },
    correct(){ tone(523,0,0.12,'triangle',0.18); tone(659,0.09,0.12,'triangle',0.18); tone(784,0.18,0.24,'triangle',0.2); },
    fail(){ tone(220,0,0.16,'sawtooth',0.14); tone(150,0.13,0.3,'sawtooth',0.14); },
    tick(){ tone(880,0,0.05,'square',0.08); },
    start(){ tone(392,0,0.08,'sine',0.12); tone(523,0.07,0.14,'sine',0.14); },
    fanfare(){ [523,659,784,1046,1318].forEach((f,i)=> tone(f, i*0.13, 0.32,'triangle',0.2)); }
  };
})();
function toggleMute(){
  const m = SFX.toggleMute();
  document.getElementById('muteBtn').textContent = m ? '🔇' : '🔊';
}

/* ======================= CONFETTI ======================= */
function burstConfetti(){
  const colors = ['#D6291B','#E8B84B','#FBF8F2','#9E1B10'];
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML='';
  for(let i=0;i<40;i++){
    const el = document.createElement('div');
    el.className='confetti-piece';
    el.style.left = (Math.random()*100)+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2.2 + Math.random()*1.6)+'s';
    el.style.animationDelay = (Math.random()*0.6)+'s';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    layer.appendChild(el);
  }
  setTimeout(()=>{ layer.innerHTML=''; }, 4500);
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function buildRoundPlan(n){
  const plan=[];
  const types = ["anameen","maglouba","wasf","trivia","factfiction","draw"];
  while(plan.length<n){ plan.push(...shuffle(types)); }
  return plan.slice(0,n);
}
function pickItem(bank, usedSet){
  if(usedSet.size>=bank.length) usedSet.clear();
  let idx;
  do{ idx=Math.floor(Math.random()*bank.length); }while(usedSet.has(idx));
  usedSet.add(idx);
  return bank[idx];
}

function renderRoundStart(){
  CURRENT_TYPE = S.roundPlan[S.currentRound];
  const gt = GAME_TYPES[CURRENT_TYPE];
  CLUE_IDX = 0;

  switch(CURRENT_TYPE){
    case 'anameen': CURRENT_ITEM = pickItem(ANA_MEEN, S.usedAnaMeen); break;
    case 'maglouba':
    case 'wasf': CURRENT_ITEM = pickItem(WASF_WORDS, S.usedWasf); break;
    case 'trivia': CURRENT_ITEM = pickItem(TRIVIA_QUESTIONS, S.usedTrivia); break;
    case 'factfiction': CURRENT_ITEM = pickItem(FACT_OR_FICTION, S.usedFactFiction); break;
    case 'draw': CURRENT_ITEM = pickItem(DRAW_WORDS, S.usedDraw); break;
  }

  document.getElementById('app').innerHTML = `
    <div class="topbar"><span>جولة ${S.currentRound+1} من ${S.totalRounds}</span><span>${gt.name}</span></div>
    ${scoreboardHTML()}
    <div class="turn-line">دور <b>${currentTeam().name}</b> — سلّم الجهاز للاعب اللي هيقرأ البطاقة</div>

        <button class="btn on-card-primary" onclick="revealRound()">أنا شايف — ابدأ</button>
      </div>
    ${stampClose}
  `;
}

    ${stampOpen()}
      <div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="tfill" style="width:100%;"></div></div>
        <div class="timer-num" id="tnum">${GAME_TYPES.draw.time}</div>
      </div>
      <canvas id="drawCanvas" width="320" height="280"></canvas>
      <div class="clear-row">
        <button class="btn on-card-outline clear-btn" onclick="clearCanvas()">امسح اللوح</button>
      </div>
      <div class="btn-row">
        <button class="btn on-card-outline" onclick="failRound()">خلص الوقت / فشل</button>
        <button class="btn on-card-primary" onclick="scoreRound(${GAME_TYPES.draw.points})">خمّنوا صح ✔</button>
      </div>
    ${stampClose}
  `;
  setupCanvas();
  startTimer(GAME_TYPES.draw.time);
}
function setupCanvas(){
  const canvas = document.getElementById('drawCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#161311'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let drawing = false, last = null;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches && e.touches[0];
    const clientX = t ? t.clientX : e.clientX;
    const clientY = t ? t.clientY : e.clientY;
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }
  function start(e){ drawing = true; last = pos(e); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last = p; e.preventDefault();
  }
  function end(){ drawing = false; }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}
function clearCanvas(){
  SFX.click();
  const canvas = document.getElementById('drawCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function startTimer(total){
  clearInterval(S.timerHandle);
  let t = total;
  S.timerHandle = setInterval(()=>{
    t--;
    const fill = document.getElementById('tfill');
    const num = document.getElementById('tnum');
    if(fill) fill.style.width = Math.max(0,(t/total*100))+'%';
    if(num){
      num.textContent = Math.max(0,t);
      num.classList.toggle('urgent', t<=5 && t>0);
    }
    if(t<=5 && t>0){ SFX.tick(); }
    if(t<=0){ clearInterval(S.timerHandle); failRound(); }
  },1000);
}

/* ======================= SCORING / RESULT ======================= */
function scoreRound(points){
  clearInterval(S.timerHandle);
  SFX.correct();
  currentTeam().score += points;
  showResult(true, points);
}
function failRound(){
  clearInterval(S.timerHandle);
  SFX.fail();
  showResult(false, 0);
}
function showResult(won, points){
  let answer;
  if(CURRENT_TYPE==='anameen') answer = CURRENT_ITEM.t;
  else if(CURRENT_TYPE==='trivia') answer = CURRENT_ITEM.options[CURRENT_ITEM.correct];
  else if(CURRENT_TYPE==='factfiction') answer = CURRENT_ITEM.isFact ? 'علم — معلومة صحيحة ✅' : 'خيال — معلومة غلط ❌';
  else answer = CURRENT_ITEM;
  document.getElementById('app').innerHTML = `
    ${stampOpen()}
      <div class="result-title">${won? 'برافو! 🎉' : 'محدش عرفها 😅'}</div>
      <div class="result-sub">${won? `+${points} نقطة لـ ${currentTeam().name}` : 'مفيش نقاط الجولة دي'}</div>
      <div class="badge-label">الاجابة كانت</div>
      <div class="answer-reveal">${answer}</div>
      <button class="btn on-card-primary" onclick="nextRound()">${S.currentRound+1 >= S.totalRounds ? 'شوف النتيجة النهائية' : 'الجولة الجاية'}</button>
    ${stampClose}
  `;
}
function nextRound(){
  SFX.click();
  S.currentRound++;
  if(S.currentRound >= S.totalRounds){ renderResults(); }
  else{ renderRoundStart(); }
}

/* ======================= RESULTS ======================= */
function renderResults(){
  SFX.fanfare();
  burstConfetti();
  const sorted = S.teams.slice().sort((a,b)=>b.score-a.score);
  const winner = sorted[0];
  document.getElementById('app').innerHTML = `
    <div class="eyebrow">خلصت اللعبة</div>
    <div class="display-title">الفايز: <span class="accent">${winner.name}</span></div>
    <div class="subtitle">بـ ${winner.score} نقطة</div>
    ${stampOpen()}
      <div class="badge-label">النتيجة النهائية</div>
      <div style="margin-top:12px;">
        ${sorted.map((t,i)=>`
          <div class="lb-row ${i===0?'winner':''}">
            <div class="lb-rank">${i+1}</div>
            <div class="lb-name">${t.name}</div>
            <div class="lb-score">${t.score}</div>
          </div>
        `).join("")}
      </div>
      <button class="btn on-card-primary" style="margin-top:16px;" onclick="resetGame()">لعبة جديدة</button>
    ${stampClose}
  `;
}
function resetGame(){
  SFX.click();
  S.teams.forEach(t=>t.score=0);
  renderSetup();
}

/* ======================= INIT ======================= */
renderSetup();
</script>
</body>
